name: Playwright Tests

on:
    push:
        branches: [ main, master ]
    pull_request:
        branches: [ main, master ]

jobs:
    e2e:
        timeout-minutes: 30
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 22
            - name: Install dependencies
              run: |
                  npm ci
                  npx playwright install --with-deps
            - name: Start local environment
              run: |
                  cp .env.test .env
                  docker compose up -d
                  sleep 15
                  yarn migrate
                  yarn seed
                  yarn build
                  yarn start -p 8100 &
              env:
                  PROTECTED_API_KEYS: test-api-key
                  DATABASE_URL: postgres://secretariat:secretariat@127.0.0.1:5432/secretariat
                  FEATURE_SHOULD_SEND_MESSAGE_TO_AUTHOR: true
                  NEWSLETTER_HASH_SECRET: fakenewslettersecret
                  SHOULD_SEND_NL: true
                  SESSION_SECRET: fakesessionsecret
                  MAIL_PASS: fakepass
                  MAIL_USER: fakeuser
                  MAIL_SENDER: fake@localhost
                  HOSTNAME: localhost:8100
                  HASH_SALT: fakesaltfortestenv
                  GITHUB_FORK: dummy-github-fork
                  MAILING_LIST_NEWSLETTER: 0
            - name: Wait
              uses: cygnetdigital/wait_for_response@v2.0.0
              with:
                  url: "http://localhost:8100/"
                  responseCode: "200"
                  timeout: 120000
                  interval: 500
            - name: Launch playwright
              run: |
                  npx playwright test --reporter=list
              env:
                  HOSTNAME: localhost:8100
                  DATABASE_URL: postgres://secretariat:secretariat@127.0.0.1:5432/secretariat
                  FEATURE_SHOULD_SEND_MESSAGE_TO_AUTHOR: true
                  NEWSLETTER_HASH_SECRET: fakenewslettersecret
                  SHOULD_SEND_NL: true
                  SESSION_SECRET: fakesessionsecret
                  MAIL_PASS: fakepass
                  MAIL_USER: fakeuser
                  MAIL_SENDER: fake@localhost
                  HASH_SALT: fakesaltfortestenv
                  GITHUB_FORK: dummy-github-fork
                  MAILING_LIST_NEWSLETTER: 0
            - uses: actions/upload-artifact@v7
              if: always()
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 3
