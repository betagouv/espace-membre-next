- title: "🏁 Dès l'officialisation de la fin de mission"
  items:
    - id: offboarding-lire-doc-desembarquement
      title: "[Lire la documentation sur la gestion de son désembarquement](https://doc.incubateur.net/communaute/travailler-chez-beta.gouv.fr/je-quitte-beta.gouv.fr)"
    - id: offboarding-informer-titulaire-marche
      title: Informer le.a titulaire du marché public
    - id: offboarding-informer-responsables-incubateur
      title: Informer les responsables de l'incubateur
    - id: offboarding-informer-equipe-produit
      title: Informer les membres de ton équipe
    - id: offboarding-plan-passation
      title: Co-préparer ton plan de passation avec le.a responsable de l'équipe produit
- title: "⏮️ Le dernier mois"
  items:
    - id: offboarding-transfert-connaissances
      title: Consigner et transmettre aux autres membres toutes tes connaissances liées au projet 
    - id: offboarding-transfert-taches
      title: "Transmettre l'ensemble de tes tâches/missions et responsabilités aux autres membres de l'équipe"
    - id: offboarding-transfert-reseau
      title: "Transmettre l'ensemble des informations liées à ton réseau relationnel propre au projet (sponsors, contacts, prestataires) aux autres membres de l'équipe"
    - id: offboarding-echanges-structures
      title: Organiser des temps d'échanges structurés et obtenir une validation explicite de la compréhension des sujets par les autres membres de l'équipe
    - id: offboarding-droits-admin
      title: Transmettre tes droits d'administrateur des plateformes que tu utilises
    - id: offboarding-date-depart-espace-membre
      title: Renseigner ta date de départ exacte dans ton espace membre
    - id: offboarding-retirer-droits-agenda
      title: Retirer tes droits d'écriture de l'agenda public de l'incubateur
- title: "👋 Les derniers jours"
  items:
    - id: offboarding-verifier-blocages
      title: Vérifier qu'il ne reste aucun potentiel blocage critique lié à ta fin de mission
    - id: offboarding-livrer-livrables
      title: Livrer tes derniers livrables de mission (au standard définis lors de la prise de commande)
    - id: offboarding-rapport-services-faits
      title: Livrer au titulaire du marché public ton dernier rapport de services faits
    - id: offboarding-echange-sortie-responsable
      title: Organiser ton échange de sortie avec le.a responsable de l'équipe produit
    - id: offboarding-echange-sortie-titulaire
      title: Organiser ton échange de sortie avec le.a titulaire du marché public
    - id: offboarding-quitter-vaultwarden
      title: "Si tu utilises Vaultwarden : partager les mots de passes utiles avec mon équipe et supprimer mon compte"
    - id: offboarding-quitter-scalingo
      title: "Si tu utilises Scalingo : quitter l'organisation BetaGouv"
    - id: offboarding-desactiver-comptes
      title: Désactiver tous tes comptes ou abonnements liés à ta mission
    - id: offboarding-rediriger-email
      title: "Rediriger ton adresse @beta.gouv.fr vers departs@beta.gouv.fr en le demandant sur #incubateur-secretariat"
    - id: offboarding-rendre-badges
      title: Rendre les badges d'accès aux locaux (Ségur, Plateforme de l'inclusion etc)
- title: "Pour aller plus loin"
  items:
    - id: offboarding-retour-experience
      title: Remplir mon [retour d'expérience au sein de la communauté](https://grist.numerique.gouv.fr/o/isn/forms/jGrwi97QpXsRynJpCEubxj/4)
    - id: offboarding-infolettre
      title: "T'inscrire à l'infolettre de la communauté avec les coordonnées de ton choix"
    - id: offboarding-forum-mensuel
      title: "T'inscrire au prochain forum mensuel de la communauté"
